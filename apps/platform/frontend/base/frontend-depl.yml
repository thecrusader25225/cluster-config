apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-frontend
  labels:
    app: platform-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: platform-frontend
  template:
    metadata:
      labels:
        app: platform-frontend
    spec:
      containers:
      - name: reactjs
        image: shane25225/platform-frontend:v2
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: platform-frontend-config
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"