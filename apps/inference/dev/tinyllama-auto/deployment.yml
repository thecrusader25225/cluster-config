
apiVersion: apps/v1
kind: Deployment

metadata:
  name: tinyllama-auto
  namespace: inference-dev
spec:
  replicas: 1

  selector:
    matchLabels:
      app: tinyllama-auto

  template:
    metadata:
      labels:
        app: tinyllama-auto

    spec:
      containers:
      - name: llama

        image: ghcr.io/ggml-org/llama.cpp:server

        command:
          - sh
          - -c
          - |
              mkdir -p /models && \
              curl -L -o /models/model.gguf https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q2_K.gguf && \
              /app/llama-server \
                -m /models/model.gguf \
                --host 0.0.0.0 \
                --port 8080

        ports:
        - containerPort: 8080

        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"

          limits:
            memory: "2Gi"
            cpu: "1"
