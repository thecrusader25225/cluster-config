apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inference-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/thecrusader25225/cluster-config.git
    targetRevision: main
    path: apps/inference/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true